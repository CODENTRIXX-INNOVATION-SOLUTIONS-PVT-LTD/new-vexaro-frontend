<div class="success-modal">

    <!-- Close -->
    <button type="button" class="close-btn" aria-label="Close" (click)="closeModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            style="width: 1em; height: 1em;">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>

    <!-- Success Icon -->
    <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            style="width: 1.5em; height: 1.5em;">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
        </svg>
    </div>

    <h2>Distributor Created Successfully!</h2>

    <p class="subtitle">
        The distributor account has been created successfully.
    </p>

  <div class="credential-card">

    <h3>Next Step</h3>

    <div class="info">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" class="svg-icon"
            style="width:1.2em;height:1.2em;">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
        </svg>

        A secure account activation link has been sent to the distributor's registered
        email address. They can use this link to set their password and activate their
        account.
    </div>

</div>

    <button class="done-btn" (click)="closeModal()">
        Done
    </button>

</div>
