<div class="header-section">
    <h2>Security Settings</h2>
    <p class="subtitle">Manage your password and account protection</p>
</div>

<div class="shipment-card mt-4">
    <div class="form-container">
        <!-- Change Password -->
        <div class="section-title">
            <h4><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> Change Password</h4>
        </div>

        <div class="form-group" style="max-width: 400px;">
            <label>Current Password</label>
            <input type="password" [(ngModel)]="passwordData.current" class="form-control" placeholder="Enter current password">
        </div>

        <div class="form-row mt-2" style="max-width: 800px;">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" [(ngModel)]="passwordData.newPass" class="form-control" placeholder="Enter new password">
                <span class="hint">Minimum 8 characters, including a number & symbol.</span>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" [(ngModel)]="passwordData.confirm" class="form-control" placeholder="Confirm new password">
            </div>
        </div>

        <div class="mt-2" style="text-align: right; max-width: 800px;">
            <button class="submit-btn" [disabled]="isSavingPass" (click)="updatePassword()">
                @if (isSavingPass) {
                    <svg class="animate-spin svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                } @else {
                    <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                }
                {{ isSavingPass ? 'Updating...' : 'Update Password' }}
            </button>
        </div>

       
    </div>
</div>
