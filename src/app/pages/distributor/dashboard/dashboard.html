<div class="dashboard">

    <app-dashboard-header role="Distributor" [userName]="user.name" [email]="user.email"
        [profileImage]="user.profileImage"></app-dashboard-header>

    <!-- KPI Cards -->
    @if (isLoading) {
        <div class="kpi-grid mt-4">
            @for (card of cards; track card.title) {
                <div class="kpi-card glass-panel" style="opacity:0.45;pointer-events:none;">
                    <div class="kpi-icon-box" [style.background]="card.bgColor" [style.color]="card.iconColor">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                            style="width:1.2em;height:1.2em;display:inline-block;vertical-align:middle;">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                    </div>
                    <div class="kpi-content">
                        <p class="kpi-title">{{ card.title }}</p>
                        <h3 class="kpi-value" style="color:#94a3b8;">—</h3>
                    </div>
                </div>
            }
        </div>
    } @else {
        <div class="kpi-grid mt-4">
            @for (card of cards; track card.title) {
            <div class="kpi-card glass-panel">
                <div class="kpi-icon-box" [style.background]="card.bgColor" [style.color]="card.iconColor">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                        style="width: 1.2em; height: 1.2em; display: inline-block; vertical-align: middle;" class="svg-icon">
                        @if (card.icon.includes('fa-box')) {
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        } @else if (card.icon.includes('fa-user')) {
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        } @else if (card.icon.includes('fa-wallet')) {
                            <path d="M3 10h18v8a2 2 0 01-2 2H5a2 2 0 01-2-2v-8z M3 10l2-6h14l2 6"></path>
                        } @else if (card.icon.includes('fa-chart') || card.icon.includes('line')) {
                            <path d="M18 20V10M12 20V4M6 20v-6"></path>
                        } @else if (card.icon.includes('scale') || card.icon.includes('dispute') || card.icon.includes('balance')) {
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 9v4M12 17h.01"></path>
                        } @else {
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        }
                    </svg>
                </div>
                <div class="kpi-content">
                    <p class="kpi-title">{{ card.title }}</p>
                    <h3 class="kpi-value">{{ card.value }}</h3>
                </div>
            </div>
            }
        </div>
    }

    <!-- Bottom Section (Recent Activity + Franchise Summary) -->
    <app-distributor-dashboard-bottom></app-distributor-dashboard-bottom>

</div>
