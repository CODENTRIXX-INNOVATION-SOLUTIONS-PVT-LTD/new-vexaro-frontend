<div class="page-container">
    <div class="page-header">
        <div>
            <h2>My Wallet</h2>
            <div class="breadcrumb">
                <span>Distributor</span>
                <span>›</span>
                <span class="active">Wallet</span>
            </div>
        </div>
    </div>

    <!-- Balance & Quick Overview -->
    <div class="wallet-overview">
        <div class="card balance-card">
            <div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M3 10h18v8a2 2 0 01-2 2H5a2 2 0 01-2-2v-8z M3 10l2-6h14l2 6"></path></svg></div>
            <div class="card-info">
                <span class="card-label">Current Wallet Balance</span>
                <h2 class="card-value">₹{{ balance.toLocaleString('en-IN') }}</h2>
            </div>
        </div>
    </div>

    <div class="wallet-grid">
        <!-- Recharge Request Form -->
        <div class="card form-card">
            <div class="card-title">
                <div class="icon-circle blue">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                </div>
                <span>Request Wallet Recharge</span>
            </div>

            <form (ngSubmit)="submitRequest()" #rechargeForm="ngForm">
                <!-- Package Chips Selector -->
                <div class="form-group">
                    <label>Select Recharge Amount <span class="required">*</span></label>
                    <div class="package-chips">
                        <button type="button" 
                            *ngFor="let amt of packages" 
                            class="chip-btn" 
                            [class.selected]="selectedPackage === amt" 
                            (click)="selectPackage(amt)">
                            ₹{{ amt.toLocaleString('en-IN') }}
                        </button>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="paymentMethod">Payment Method</label>
                        <select id="paymentMethod" [(ngModel)]="paymentMethod" name="paymentMethod">
                            <option value="UPI">UPI</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                            <option value="Card">Card</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="referenceId">Payment Reference ID</label>
                        <input type="text" id="referenceId" [(ngModel)]="referenceId" name="referenceId" placeholder="e.g. UPI Ref ID">
                    </div>
                </div>

                <button type="submit" class="btn-submit" [disabled]="!selectedPackage">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg> Submit Request
                </button>
            </form>
        </div>

        <!-- Request History Table -->
        <div class="card table-card">
            <div class="card-title">
                <div class="icon-circle green">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline><line x1="12" y1="7" x2="12" y2="12"></line><line x1="12" y1="12" x2="16" y2="14"></line></svg>
                </div>
                <span>Payment History</span>
            </div>

            <div class="table-wrapper">
                <div class="empty-state">
                    <p>Payment history is available in the Transactions page.</p>
                    <a routerLink="/distributor/finance/transactions" class="link-btn">View Transactions</a>
                </div>
            </div>
        </div>
    </div>
</div>
