<div class="header-section">
  <h2>Create Support Ticket</h2>
  <div class="actions">
    <button class="action-btn secondary" (click)="cancel()">Cancel</button>
  </div>
</div>

<div class="shipment-card mt-4">
  <div class="form-container">

    <!-- Success -->
    @if (success) {
      <div style="display:flex;align-items:center;gap:10px;background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;border-radius:10px;padding:13px 16px;margin-bottom:18px;font-size:14px;font-weight:500;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" style="width:1.1em;height:1.1em;flex-shrink:0">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        {{ success }}
      </div>
    }

    <!-- Error -->
    @if (error) {
      <div style="display:flex;align-items:center;gap:10px;background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;border-radius:10px;padding:13px 16px;margin-bottom:18px;font-size:14px;font-weight:500;">
        {{ error }}
      </div>
    }

    <div class="form-group">
      <label>Subject <span class="required">*</span></label>
      <input type="text" [(ngModel)]="ticketData.subject" placeholder="Brief description of the issue" class="form-control" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Category <span class="required">*</span></label>
        <select [(ngModel)]="ticketData.category" class="form-control">
          <option value="" disabled>Select Category</option>
          <option value="TECHNICAL">Technical Issue</option>
          <option value="BILLING">Billing & Finance</option>
          <option value="OPERATIONS">Operations / Logistics</option>
          <option value="SHIPMENT">Shipment Issue</option>
          <option value="WEIGHT_DISPUTE">Weight Dispute</option>
          <option value="OTHER">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select [(ngModel)]="ticketData.priority" class="form-control">
          <option value="LOW">Low</option>
          <option value="MEDIUM">Medium</option>
          <option value="HIGH">High</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Detailed Description <span class="required">*</span></label>
      <textarea [(ngModel)]="ticketData.description" rows="5"
        placeholder="Please provide as much detail as possible…" class="form-control"></textarea>
    </div>

    <div class="form-actions mt-4">
      <button class="submit-btn" [disabled]="isSubmitting" (click)="submitTicket()">
        @if (isSubmitting) {
          <svg class="animate-spin svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:middle;margin-right:6px;animation:spin 0.7s linear infinite;">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          Submitting…
        } @else {
          <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:middle;margin-right:6px;">
            <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          Submit Ticket
        }
      </button>
    </div>

  </div>
</div>
