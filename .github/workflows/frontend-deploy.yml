name: Frontend Production Deployment

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Frontend
    runs-on:
      - self-hosted
      - Linux
      - X64
      - frontend

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Frontend Code
        run: |
          cd /var/www/vexaro/new-vexaro-frontend
          git fetch origin
          git reset --hard origin/master

      - name: Install Dependencies
        run: |
          cd /var/www/vexaro/new-vexaro-frontend
          npm ci

      - name: Build Angular
        env:
          VEXARO_API_URL: /api/v1
        run: |
          cd /var/www/vexaro/new-vexaro-frontend
          npm run build

      - name: Reload Nginx
        run: |
          sudo systemctl reload nginx

      - name: Verify Website
        run: |
          sleep 5

          STATUS=$(curl -k -o /dev/null -s -w "%{http_code}" https://courier.vexarocouriersolutions.com)

          if [ "$STATUS" != "200" ]; then
            echo "Website returned HTTP $STATUS"
            exit 1
          fi

          echo "✅ Frontend deployed successfully."
